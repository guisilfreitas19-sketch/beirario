<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beira Rio FC - Oficial</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBDBTZZMnq4xnrhqePqDWxAsg2aJfbFMaE",
          authDomain: "beira-rio-fc-e27b0.firebaseapp.com",
          projectId: "beira-rio-fc-e27b0",
          storageBucket: "beira-rio-fc-e27b0.firebasestorage.app",
          messagingSenderId: "113098706363",
          appId: "1:113098706363:web:5122247d7af8caa52b889e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // ⚠️ COLOQUE SEU E-MAIL AQUI
        const EMAIL_ADMIN = "SEU_EMAIL_AQUI@gmail.com"; 

        window.confirmarPresenca = () => {
            signInWithPopup(auth, provider).then(async (result) => {
                await setDoc(doc(db, "presenca_jogo", result.user.uid), {
                    nome: result.user.displayName,
                    foto: result.user.photoURL
                });
                alert("Presença confirmada!");
            });
        };

        window.salvarInfo = async () => {
            const adv = document.getElementById('edit_adv').value;
            const data = document.getElementById('edit_data').value;
            const hora = document.getElementById('edit_hora').value;
            const local = document.getElementById('edit_local').value;
            const aviso = document.getElementById('edit_aviso').value;

            await setDoc(doc(db, "configuracao", "proximo_jogo"), {
                adversario: adv, data: data, hora: hora, local: local, mural: aviso
            });
            alert("Site atualizado!");
        };

        window.zerarLista = async () => {
            if (confirm("Deseja zerar a lista de confirmados?")) {
                const snapshot = await getDocs(collection(db, "presenca_jogo"));
                for (const d of snapshot.docs) { await deleteDoc(doc(db, "presenca_jogo", d.id)); }
                alert("Lista limpa!");
            }
        };

        function atualizarCronometro(dataStr, horaStr) {
            if(!dataStr || !horaStr) return;
            
            const timer = setInterval(() => {
                const agora = new Date().getTime();
                const dataJogo = new Date(`${dataStr}T${horaStr}:00`).getTime();
                const distancia = dataJogo - agora;

                if (distancia < 0) {
                    document.getElementById("tempo").innerText = "O JOGO COMEÇOU!";
                    clearInterval(timer);
                    return;
                }

                const d = Math.floor(distancia / (1000 * 60 * 60 * 24));
                const h = Math.floor((distancia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((distancia % (1000 * 60 * 60)) / (1000 * 60));
                
                document.getElementById("tempo").innerText = `FALTAM: ${d}d ${h}h ${m}m`;
            }, 1000);
        }

        onSnapshot(doc(db, "configuracao", "proximo_jogo"), (doc) => {
            if (doc.exists()) {
                const d = doc.data();
                document.getElementById('display_adv').innerText = d.adversario || "A DEFINIR";
                document.getElementById('display_data_hora').innerText = d.data ? `${d.data.split('-').reverse().join('/')} às ${d.hora}` : "A definir";
                document.getElementById('display_local').innerText = d.local || "A definir";
                document.getElementById('display_mural').innerText = d.mural || "Sem avisos.";
                atualizarCronometro(d.data, d.hora);
            }
        });

        onSnapshot(collection(db, "presenca_jogo"), (snapshot) => {
            const lista = document.getElementById('lista');
            lista.innerHTML = "";
            snapshot.forEach((doc) => {
                const j = doc.data();
                lista.innerHTML += `<div class="jogador-item">
                    <img src="${j.foto}" style="width:30px; border-radius:50%; margin-right:10px; border:1px solid #238636;">
                    <span>${j.nome}</span>
                </div>`;
            });
            document.getElementById('total').innerText = snapshot.size;
        });

        onAuthStateChanged(auth, (user) => {
            if (user && user.email === EMAIL_ADMIN) {
                document.getElementById('painel_admin').style.display = 'block';
            }
        });
    </script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: white; padding: 15px; text-align: center; }
        .card { background: #161b22; border-radius: 12px; padding: 15px; border: 1px solid #30363d; margin-bottom: 15px; text-align: left; }
        .btn { background: #238636; color: white; border: none; width: 100%; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .admin-box { background: #1c2128; border: 2px solid #f1e05a; padding: 15px; border-radius: 12px; display: none; margin-bottom: 20px; text-align: left; }
        label { font-size: 12px; color: #f1e05a; font-weight: bold; }
        input { width: 100%; padding: 10px; margin: 5px 0 10px 0; border-radius: 5px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; }
        .escudo { width: 100px; margin-bottom: 10px; }
        .cronometro { color: #f1e05a; font-weight: bold; display: block; margin-top: 10px; border-top: 1px solid #333; padding-top: 10px; }
        .jogador-item { padding: 8px; border-bottom: 1px solid #333; display: flex; align-items: center; }
    </style>
</head>
<body>

    <img src="escudo.png" class="escudo">
    <h1>BEIRA RIO FC</h1>

    <div id="painel_admin" class="admin-box">
        <h3 style="color:#f1e05a; margin-top:0;">🛠️ Painel do Presidente</h3>
        <label>Adversário:</label> <input type="text" id="edit_adv">
        <label>Data do Jogo:</label> <input type="date" id="edit_data">
        <label>Horário:</label> <input type="time" id="edit_hora">
        <label>Local:</label> <input type="text" id="edit_local">
        <label>Aviso Mural:</label> <input type="text" id="edit_aviso">
        <div style="display:flex; gap:10px;">
            <button class="btn" style="background:#0077b6; flex:2;" onclick="salvarInfo()">SALVAR</button>
            <button class="btn" style="background:#da3633; flex:1;" onclick="zerarLista()">ZERAR</button>
        </div>
    </div>

    <div class="card" style="border-left: 5px solid #58a6ff;">
        <h3 style="margin:0; color:#58a6ff;">🗓️ PRÓXIMO JOGO:</h3>
        <p style="font-size:1.2em; margin: 10px 0;">Beira Rio vs <b id="display_adv">---</b></p>
        <p>📅 <span id="display_data_hora">---</span></p>
        <p>📍 <span id="display_local">---</span></p>
        <span id="tempo" class="cronometro">CARREGANDO...</span>
    </div>

    <button class="btn" onclick="confirmarPresenca()">⚽ CONFIRMAR MINHA PRESENÇA</button>

    <div class="card" style="margin-top:20px;">
        <h3 style="margin-top:0;">📋 Confirmados: <span id="total">0</span></h3>
        <div id="lista"></div>
    </div>

    <div class="card" style="border-left: 5px solid #f85149;">
        <h3 style="margin:0; color:#f85149;">📢 MURAL:</h3>
        <p id="display_mural" style="font-style:italic; margin-top:10px;">Sem avisos.</p>
    </div>

</body>
</html>
