<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beira Rio FC - Oficial</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBDBTZZMnq4xnrhqePqDWxAsg2aJfbFMaE",
          authDomain: "beira-rio-fc-e27b0.firebaseapp.com",
          projectId: "beira-rio-fc-e27b0",
          storageBucket: "beira-rio-fc-e27b0.firebasestorage.app",
          messagingSenderId: "113098706363",
          appId: "1:113098706363:web:5122247d7af8caa52b889e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        const EMAIL_ADMIN = "guisilfreitas19@gmail.com"; 

        window.confirmarPresenca = () => {
            signInWithPopup(auth, provider).then(async (result) => {
                await setDoc(doc(db, "presenca_jogo", result.user.uid), {
                    nome: result.user.displayName,
                    foto: result.user.photoURL
                });
            });
        };

        window.salvarInfo = async () => {
            const data = {
                adversario: document.getElementById('edit_adv').value || "A DEFINIR",
                data: document.getElementById('edit_data').value || "",
                hora: document.getElementById('edit_hora').value || "",
                local: document.getElementById('edit_local').value || "A DEFINIR",
                mural: document.getElementById('edit_aviso').value || "Sem avisos."
            };
            await setDoc(doc(db, "configuracao", "proximo_jogo"), data);
            alert("Informações atualizadas!");
        };

        window.limparParaNovoJogo = async () => {
            if (confirm("Isso vai apagar a lista de presença e resetar o jogo. Confirmar?")) {
                const snap = await getDocs(collection(db, "presenca_jogo"));
                for (const d of snap.docs) { await deleteDoc(doc(db, "presenca_jogo", d.id)); }
                await setDoc(doc(db, "configuracao", "proximo_jogo"), {
                    adversario: "A DEFINIR", data: "", hora: "", local: "A DEFINIR", mural: "Aguardando novo jogo..."
                });
            }
        };

        onSnapshot(doc(db, "configuracao", "proximo_jogo"), (doc) => {
            if (doc.exists()) {
                const d = doc.data();
                document.getElementById('display_adv').innerText = d.adversario;
                document.getElementById('display_data_hora').innerText = d.data ? `${d.data.split('-').reverse().join('/')} às ${d.hora}` : "A definir";
                document.getElementById('display_local').innerText = d.local;
                document.getElementById('display_mural').innerText = d.mural;
            }
        });

        onSnapshot(collection(db, "presenca_jogo"), (snapshot) => {
            const lista = document.getElementById('lista');
            lista.innerHTML = "";
            snapshot.forEach((doc) => {
                const j = doc.data();
                lista.innerHTML += `<div class="item-lista"><img src="${j.foto}"><span>${j.nome}</span></div>`;
            });
            document.getElementById('total').innerText = snapshot.size;
        });

        onAuthStateChanged(auth, (user) => {
            if (user && user.email === EMAIL_ADMIN) {
                document.getElementById('painel_admin').style.display = 'block';
            }
        });
    </script>

    <style>
        body { font-family: sans-serif; background: #0d1117; color: white; padding: 15px; text-align: center; margin: 0; }
        .card { background: #161b22; border-radius: 10px; padding: 15px; border: 1px solid #30363d; margin-bottom: 15px; text-align: left; }
        .btn { background: #238636; color: white; border: none; width: 100%; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .admin-box { background: #1c2128; border: 2px solid #f1e05a; padding: 15px; border-radius: 10px; display: none; margin-bottom: 20px; text-align: left; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; }
        .escudo { width: 90px; margin-bottom: 10px; }
        .item-lista { padding: 10px; border-bottom: 1px solid #333; display: flex; align-items: center; }
        .item-lista img { width: 30px; border-radius: 50%; margin-right: 12px; border: 1px solid #238636; }
        label { font-size: 11px; color: #f1e05a; font-weight: bold; text-transform: uppercase; }
        h1 { margin: 10px 0; }
    </style>
</head>
<body>

    <img src="escudo.png" class="escudo">
    <h1>BEIRA RIO FC</h1>

    <div id="painel_admin" class="admin-box">
        <label>⚙️ Painel do Presidente</label>
        <input type="text" id="edit_adv" placeholder="Próximo Adversário">
        <div style="display:flex; gap:10px;"><input type="date" id="edit_data"><input type="time" id="edit_hora"></div>
        <input type="text" id="edit_local" placeholder="Local do Jogo">
        <input type="text" id="edit_aviso" placeholder="Aviso no Mural">
        <button class="btn" style="background:#0077b6;" onclick="salvarInfo()">ATUALIZAR JOGO</button>
        <button class="btn" style="background:#da3633; margin-top: 5px;" onclick="limparParaNovoJogo()">LIMPAR TUDO PARA NOVO JOGO</button>
    </div>

    <div class="card" style="border-left: 5px solid #58a6ff;">
        <h3 style="margin:0; color:#58a6ff;">🗓️ PRÓXIMO JOGO</h3>
        <p style="font-size: 1.2em; margin: 10px 0;">Beira Rio vs <b id="display_adv">---</b></p>
        <p>📅 <span id="display_data_hora">---</span></p>
        <p>📍 <span id="display_local">---</span></p>
    </div>

    <button class="btn" onclick="confirmarPresenca()">⚽ CONFIRMAR MINHA PRESENÇA</button>

    <div class="card">
        <h3 style="margin-top:0;">📋 CONFIRMADOS: <span id="total" style="color:#238636;">0</span></h3>
        <div id="lista"></div>
    </div>

    <div class="card" style="border-left: 5px solid #f85149;">
        <h3 style="margin:0; color:#f85149;">📢 MURAL</h3>
        <p id="display_mural" style="font-style:italic; margin-top:10px;">Sem avisos.</p>
    </div>

</body>
</html>
