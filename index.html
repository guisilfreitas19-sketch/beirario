<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beira Rio FC - Oficial</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot, getDocs, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBDBTZZMnq4xnrhqePqDWxAsg2aJfbFMaE",
          authDomain: "beira-rio-fc-e27b0.firebaseapp.com",
          projectId: "beira-rio-fc-e27b0",
          storageBucket: "beira-rio-fc-e27b0.firebasestorage.app",
          messagingSenderId: "113098706363",
          appId: "1:113098706363:web:5122247d7af8caa52b889e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        const EMAIL_ADMIN = "guisilfreitas19@gmail.com"; 

        window.confirmarPresenca = () => {
            signInWithPopup(auth, provider).then(async (result) => {
                await setDoc(doc(db, "presenca_jogo", result.user.uid), {
                    nome: result.user.displayName,
                    foto: result.user.photoURL
                });
                alert("Presença confirmada!");
            });
        };

        window.salvarInfo = async () => {
            const adv = document.getElementById('edit_adv').value;
            const data = document.getElementById('edit_data').value;
            const hora = document.getElementById('edit_hora').value;
            const local = document.getElementById('edit_local').value;
            const aviso = document.getElementById('edit_aviso').value;
            await setDoc(doc(db, "configuracao", "proximo_jogo"), {
                adversario: adv, data: data, hora: hora, local: local, mural: aviso
            });
            alert("Informações do jogo salvas!");
        };

        window.adicionarGol = async () => {
            const nome = document.getElementById('art_nome').value;
            const gols = parseInt(document.getElementById('art_gols').value);
            if(!nome || isNaN(gols)) return alert("Preencha nome e gols!");
            await setDoc(doc(db, "artilharia", nome), { nome: nome, gols: gols });
            alert("Gol registrado!");
        };

        window.zerarTudoParaNovoJogo = async () => {
            if (confirm("ATENÇÃO: Isso vai limpar a lista de confirmados e resetar os dados do jogo atual. Confirmar?")) {
                // 1. Limpa os Confirmados
                const snap = await getDocs(collection(db, "presenca_jogo"));
                for (const d of snap.docs) { await deleteDoc(doc(db, "presenca_jogo", d.id)); }
                
                // 2. Reseta as informações do Jogo
                await setDoc(doc(db, "configuracao", "proximo_jogo"), {
                    adversario: "A DEFINIR", data: "", hora: "", local: "A DEFINIR", mural: "Aguardando novo jogo..."
                });
                
                alert("Site limpo para o próximo racha!");
            }
        };

        window.zerarArtilharia = async () => {
            if (confirm("Deseja zerar a artilharia?")) {
                const snap = await getDocs(collection(db, "artilharia"));
                for (const d of snap.docs) { await deleteDoc(doc(db, "artilharia", d.id)); }
                alert("Gols zerados!");
            }
        };

        function iniciarCronometro(dataStr, horaStr) {
            const el = document.getElementById("tempo");
            if(!dataStr || !horaStr) { el.innerText = "AGUARDANDO DATA..."; return; }
            
            setInterval(() => {
                const agora = new Date().getTime();
                const dataJogo = new Date(`${dataStr}T${horaStr}:00`).getTime();
                const dist = dataJogo - agora;
                if (dist < 0) { el.innerText = "JOGO EM ANDAMENTO!"; return; }
                const d = Math.floor(dist / (1000 * 60 * 60 * 24));
                const h = Math.floor((dist % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((dist % (1000 * 60 * 60)) / (1000 * 60));
                el.innerText = `FALTAM: ${d}d ${h}h ${m}m`;
            }, 1000);
        }

        onSnapshot(doc(db, "configuracao", "proximo_jogo"), (doc) => {
            if (doc.exists()) {
                const d = doc.data();
                document.getElementById('display_adv').innerText = d.adversario;
                document.getElementById('display_data_hora').innerText = d.data ? `${d.data.split('-').reverse().join('/')} às ${d.hora}` : "A definir";
                document.getElementById('display_local').innerText = d.local;
                document.getElementById('display_mural').innerText = d.mural;
                iniciarCronometro(d.data, d.hora);
            }
        });

        onSnapshot(collection(db, "presenca_jogo"), (snapshot) => {
            const lista = document.getElementById('lista');
            lista.innerHTML = "";
            snapshot.forEach((doc) => {
                const j = doc.data();
                lista.innerHTML += `<div class="item-lista"><img src="${j.foto}"><span>${j.nome}</span></div>`;
            });
            document.getElementById('total').innerText = snapshot.size;
        });

        onSnapshot(collection(db, "artilharia"), (snapshot) => {
            const lista = document.getElementById('lista_artilharia');
            lista.innerHTML = "";
            let arts = [];
            snapshot.forEach(d => arts.push(d.data()));
            arts.sort((a, b) => b.gols - a.gols);
            arts.forEach((a, i) => {
                lista.innerHTML += `<div class="item-lista"><b>${i+1}º</b> <span style="flex:1; margin-left:10px;">${a.nome}</span> <b>${a.gols} Gols</b></div>`;
            });
        });

        onAuthStateChanged(auth, (user) => {
            if (user && user.email === EMAIL_ADMIN) document.getElementById('painel_admin').style.display = 'block';
        });
    </script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: white; padding: 10px; text-align: center; margin:0; }
        .card { background: #161b22; border-radius: 10px; padding: 12px; border: 1px solid #30363d; margin-bottom: 10px; text-align: left; }
        .btn { background: #238636; color: white; border: none; width: 100%; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .admin-box { background: #1c2128; border: 1px solid #f1e05a; padding: 12px; border-radius: 10px; display: none; margin-bottom: 15px; text-align: left; }
        input { width: 100%; padding: 8px; margin: 4px 0 8px 0; border-radius: 4px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; }
        .escudo { width: 80px; margin: 5px 0; }
        .item-lista { padding: 6px; border-bottom: 1px solid #333; display: flex; align-items: center; }
        .item-lista img { width: 25px; border-radius: 50%; margin-right: 10px; border: 1px solid #238636; }
        .cronometro { color: #f1e05a; font-weight: bold; display: block; margin-top: 8px; text-align: center; border-top: 1px solid #333; padding-top: 8px; }
        label { font-size: 11px; color: #f1e05a; text-transform: uppercase; font-weight: bold; }
    </style>
</head>
