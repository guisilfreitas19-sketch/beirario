<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beira Rio FC - Painel</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBDBTZZMnq4xnrhqePqDWxAsg2aJfbFMaE",
          authDomain: "beira-rio-fc-e27b0.firebaseapp.com",
          projectId: "beira-rio-fc-e27b0",
          storageBucket: "beira-rio-fc-e27b0.firebasestorage.app",
          messagingSenderId: "113098706363",
          appId: "1:113098706363:web:5122247d7af8caa52b889e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // ⚠️ COLOQUE SEU E-MAIL AQUI PARA APARECER O PAINEL SÓ PARA VOCÊ
        const EMAIL_ADMIN = "SEU_EMAIL_AQUI@gmail.com"; 

        // LOGIN E PRESENÇA
        window.confirmarPresenca = () => {
            signInWithPopup(auth, provider).then(async (result) => {
                await setDoc(doc(db, "presenca_jogo", result.user.uid), {
                    nome: result.user.displayName,
                    foto: result.user.photoURL,
                    data: new Date().toLocaleString('pt-BR')
                });
                alert("Presença confirmada!");
            });
        };

        // SALVAR INFO DO JOGO (SÓ ADMIN)
        window.salvarInfo = async () => {
            const adv = document.getElementById('edit_adv').value;
            const hora = document.getElementById('edit_hora').value;
            const aviso = document.getElementById('edit_aviso').value;
            await setDoc(doc(db, "configuracao", "proximo_jogo"), {
                adversario: adv,
                horario: hora,
                mural: aviso
            });
            alert("Site atualizado!");
        };

        // ESCUTAR MUDANÇAS (SITE ATUALIZA SOZINHO)
        onSnapshot(doc(db, "configuracao", "proximo_jogo"), (doc) => {
            if (doc.exists()) {
                const data = doc.data();
                document.getElementById('display_adv').innerText = data.adversario;
                document.getElementById('display_hora').innerText = data.horario;
                document.getElementById('display_mural').innerText = data.mural;
            }
        });

        onSnapshot(collection(db, "presenca_jogo"), (snapshot) => {
            const lista = document.getElementById('lista');
            lista.innerHTML = "";
            snapshot.forEach((doc) => {
                const j = doc.data();
                lista.innerHTML += `<div style="padding:10px; border-bottom:1px solid #333; display:flex; align-items:center;">
                    <img src="${j.foto}" style="width:30px; border-radius:50%; margin-right:10px;">
                    <span>${j.nome}</span>
                </div>`;
            });
            document.getElementById('total').innerText = snapshot.size;
        });

        // VERIFICAR SE É ADMIN PARA MOSTRAR O PAINEL
        onAuthStateChanged(auth, (user) => {
            if (user && user.email === EMAIL_ADMIN) {
                document.getElementById('painel_admin').style.display = 'block';
            }
        });
    </script>

    <style>
        body { font-family: sans-serif; background: #0d1117; color: white; padding: 15px; margin: 0; }
        .card { background: #161b22; border-radius: 12px; padding: 15px; border: 1px solid #30363d; margin-bottom: 15px; }
        .btn { background: #238636; color: white; border: none; width: 100%; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .admin-box { background: #21262d; border: 2px dashed #f1e05a; padding: 15px; border-radius: 12px; display: none; margin-bottom: 20px; }
        input { width: 100%; padding: 8px; margin: 5px 0 15px 0; border-radius: 5px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; }
    </style>
</head>
<body>

    <h1 style="text-align:center;">⚽ BEIRA RIO FC</h1>

    <div id="painel_admin" class="admin-box">
        <h3 style="margin-top:0; color:#f1e05a;">🛠️ Painel do Presidente</h3>
        <label>Adversário:</label>
        <input type="text" id="edit_adv" placeholder="Ex: Ajax FC">
        <label>Horário:</label>
        <input type="text" id="edit_hora" placeholder="Ex: Domingo, 08:30">
        <label>Aviso do Mural:</label>
        <input type="text" id="edit_aviso" placeholder="Ex: Levar fardamento reserva">
        <button class="btn" style="background:#0077b6;" onclick="salvarInfo()">ATUALIZAR SITE</button>
    </div>

    <div class="card">
        <h2 style="margin:0; color:#58a6ff;">🗓️ Próximo Jogo</h2>
        <p style="font-size:1.2em; font-weight:bold;">Beira Rio vs <span id="display_adv">Carregando...</span></p>
        <p>⏰ <span id="display_hora">Carregando...</span></p>
    </div>

    <button class="btn" onclick="confirmarPresenca()">CONFIRMAR PRESENÇA</button>

    <div class="card" style="margin-top:20px;">
        <h3>Convocados: <span id="total" style="color:#238636;">0</span></h3>
        <div id="lista"></div>
    </div>

    <div class="card">
        <h3 style="color:#f85149;">📢 Mural</h3>
        <p id="display_mural" style="font-style:italic;">Aguardando avisos...</p>
    </div>

</body>
</html>
