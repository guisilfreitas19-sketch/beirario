<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beira Rio FC - Oficial</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBDBTZZMnq4xnrhqePqDWxAsg2aJfbFMaE",
          authDomain: "beira-rio-fc-e27b0.firebaseapp.com",
          projectId: "beira-rio-fc-e27b0",
          storageBucket: "beira-rio-fc-e27b0.firebasestorage.app",
          messagingSenderId: "113098706363",
          appId: "1:113098706363:web:5122247d7af8caa52b889e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // ⚠️ COLOQUE SEU E-MAIL DE ADMIN AQUI ENTRE AS ASPAS
        const EMAIL_ADMIN = "SEU_EMAIL_AQUI@gmail.com"; 

        window.confirmarPresenca = () => {
            signInWithPopup(auth, provider).then(async (result) => {
                await setDoc(doc(db, "presenca_jogo", result.user.uid), {
                    nome: result.user.displayName,
                    foto: result.user.photoURL,
                    data: new Date().toLocaleString('pt-BR')
                });
                alert("Presença confirmada, guerreiro!");
            });
        };

        window.salvarInfo = async () => {
            const adv = document.getElementById('edit_adv').value;
            const detalhes = document.getElementById('edit_detalhes').value;
            const aviso = document.getElementById('edit_aviso').value;
            await setDoc(doc(db, "configuracao", "proximo_jogo"), {
                adversario: adv, detalhes: detalhes, mural: aviso
            });
            alert("Informações do jogo atualizadas!");
        };

        window.zerarLista = async () => {
            if (confirm("Deseja zerar a lista para o próximo jogo? Isso apagará todos os nomes!")) {
                const querySnapshot = await getDocs(collection(db, "presenca_jogo"));
                for (const documento of querySnapshot.docs) {
                    await deleteDoc(doc(db, "presenca_jogo", documento.id));
                }
                alert("Lista zerada com sucesso!");
            }
        };

        onSnapshot(doc(db, "configuracao", "proximo_jogo"), (doc) => {
            if (doc.exists()) {
                const data = doc.data();
                document.getElementById('display_adv').innerText = data.adversario || "A definir";
                document.getElementById('display_detalhes').innerText = data.detalhes || "A definir";
                document.getElementById('display_mural').innerText = data.mural || "Sem avisos.";
            }
        });

        onSnapshot(collection(db, "presenca_jogo"), (snapshot) => {
            const lista = document.getElementById('lista');
            lista.innerHTML = "";
            snapshot.forEach((doc) => {
                const j = doc.data();
                lista.innerHTML += `<div class="jogador-item">
                    <img src="${j.foto}" style="width:35px; border-radius:50%; margin-right:12px; border:2px solid #238636;">
                    <span>${j.nome}</span>
                </div>`;
            });
            document.getElementById('total').innerText = snapshot.size;
        });

        onAuthStateChanged(auth, (user) => {
            if (user && user.email === EMAIL_ADMIN) {
                document.getElementById('painel_admin').style.display = 'block';
            }
        });
    </script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: white; padding: 15px; margin: 0; }
        .escudo { display: block; margin: 10px auto; width: 120px; height: 120px; object-fit: contain; }
        .card { background: #161b22; border-radius: 12px; padding: 15px; border: 1px solid #30363d; margin-bottom: 15px; }
        .btn { background: #238636; color: white; border: none; width: 100%; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.2s; }
        .btn:active { transform: scale(0.98); }
        .admin-box { background: #1c2128; border: 2px solid #f1e05a; padding: 15px; border-radius: 12px; display: none; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 5px 0 15px 0; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; }
        label { font-weight: bold; color: #f1e05a; font-size: 14px; }
        .jogador-item { padding: 12px; border-bottom: 1px solid #30363d; display: flex; align-items: center; background: #0d1117; margin-bottom: 5px; border-radius: 8px; }
    </style>
</head>
<body>

    <img class="escudo" src="escudo.png" alt="Escudo Beira Rio FC">
    <h2 style="text-align:center; color:white; margin: 0 0 20px 0;">BEIRA RIO FC</h2>

    <div id="painel_admin" class="admin-box
