<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beira Rio FC - Oficial</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBDBTZZMnq4xnrhqePqDWxAsg2aJfbFMaE",
          authDomain: "beira-rio-fc-e27b0.firebaseapp.com",
          projectId: "beira-rio-fc-e27b0",
          storageBucket: "beira-rio-fc-e27b0.firebasestorage.app",
          messagingSenderId: "113098706363",
          appId: "1:113098706363:web:5122247d7af8caa52b889e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        const EMAIL_ADMIN = "guisilfreitas19@gmail.com"; 

        window.confirmarPresenca = () => {
            signInWithPopup(auth, provider).then(async (result) => {
                await setDoc(doc(db, "presenca_jogo", result.user.uid), {
                    nome: result.user.displayName,
                    foto: result.user.photoURL
                }).catch(e => console.error("Erro ao confirmar:", e));
            });
        };

        window.salvarInfo = async () => {
            const data = {
                adversario: document.getElementById('edit_adv').value || "A DEFINIR",
                data: document.getElementById('edit_data').value || "",
                hora: document.getElementById('edit_hora').value || "",
                local: document.getElementById('edit_local').value || "A DEFINIR",
                mural: document.getElementById('edit_aviso').value || "Sem avisos."
            };
            await setDoc(doc(db, "configuracao", "proximo_jogo"), data);
            alert("Salvo!");
        };

        window.adicionarGol = async () => {
            const nome = document.getElementById('art_nome').value;
            const gols = parseInt(document.getElementById('art_gols').value);
            if(nome) await setDoc(doc(db, "artilharia", nome), { nome: nome, gols: gols || 0 });
        };

        window.zerarTudoParaNovoJogo = async () => {
            if (confirm("Limpar lista e resetar jogo?")) {
                const snap = await getDocs(collection(db, "presenca_jogo"));
                for (const d of snap.docs) { await deleteDoc(doc(db, "presenca_jogo", d.id)); }
                await setDoc(doc(db, "configuracao", "proximo_jogo"), {
                    adversario: "A DEFINIR", data: "", hora: "", local: "A DEFINIR", mural: "Aguardando..."
                });
            }
        };

        onSnapshot(doc(db, "configuracao", "proximo_jogo"), (doc) => {
            if (doc.exists()) {
                const d = doc.data();
                document.getElementById('display_adv').innerText = d.adversario || "A DEFINIR";
                document.getElementById('display_data_hora').innerText = d.data ? `${d.data.split('-').reverse().join('/')} às ${d.hora}` : "A definir";
                document.getElementById('display_local').innerText = d.local || "A definir";
                document.getElementById('display_mural').innerText = d.mural || "---";
            }
        });

        onSnapshot(collection(db, "presenca_jogo"), (snapshot) => {
            const lista = document.getElementById('lista');
            lista.innerHTML = "";
            snapshot.forEach((doc) => {
                const j = doc.data();
                lista.innerHTML += `<div class="item-lista"><img src="${j.foto}"><span>${j.nome}</span></div>`;
            });
            document.getElementById('total').innerText = snapshot.size;
        });

        onSnapshot(collection(db, "artilharia"), (snapshot) => {
            const lista = document.getElementById('lista_artilharia');
            lista.innerHTML = "";
            let arts = [];
            snapshot.forEach(d => arts.push(d.data()));
            arts.sort((a, b) => b.gols - a.gols);
            arts.forEach((a, i) => {
                lista.innerHTML += `<div class="item-lista"><b>${i+1}º</b> <span style="flex:1; margin-left:10px;">${a.nome}</span> <b>${a.gols} Gols</b></div>`;
            });
        });

        onAuthStateChanged(auth, (user) => {
            if (user && user.email === EMAIL_ADMIN) document.getElementById('painel_admin').style.display = 'block';
        });
    </script>

    <style>
        body { font-family: sans-serif; background: #0d1117; color: white; padding: 15px; text-align: center; margin: 0; }
        .card { background: #161b22; border-radius: 10px; padding: 15px; border: 1px solid #30363d; margin-bottom: 10px; text-align: left; }
        .btn { background: #238636; color: white; border: none; width: 100%; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .admin-box { background: #1c2128; border: 1px solid #f1e05a; padding: 15px; border-radius: 10px; display: none; margin-bottom: 20px; text-align: left; }
        input { width: 100%; padding: 10px; margin: 5px 0; border-radius: 4px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; }
        .escudo { width: 100px; margin-bottom: 10px; }
        .item-lista { padding: 8px; border-bottom: 1px solid #333; display: flex; align-items: center; }
        .item-lista img { width: 30px; border-radius: 50%; margin-right: 10px; border: 1px solid #238636; }
    </style>
</head>
<body>

    <img src="escudo.png" class="escudo">
    <h1>BEIRA RIO FC</h1>

    <div id="painel_admin" class="admin-box">
        <label>Configurar Jogo:</label>
        <input type="text" id="edit_adv" placeholder="Adversário">
        <input type="date" id="edit_data">
        <input type="time" id="edit_hora">
        <input type="text" id="edit_local" placeholder="Local">
        <input type="text" id="edit_aviso" placeholder="Mural">
        <button class="btn" style="background:#0077b6;" onclick="salvarInfo()">SALVAR JOGO</button>
        <hr>
        <button class="btn" style="background:#da3633;" onclick="zerarTudoParaNovoJogo()">LIMPAR LISTA E JOGO</button>
    </div>

    <div class="card" style="border-left: 5px solid #58a6ff;">
        <h3 style="margin:0; color:#58a6ff;">PRÓXIMO JOGO</h3>
        <p>Beira Rio vs <b id="display_adv">---</b></p>
        <p>📅 <span id="display_data_hora">---</span></p>
        <p>📍 <span id="display_local">---</span></p>
    </div>

    <button class="btn" onclick="confirmarPresenca()">⚽ CONFIRMAR PRESENÇA</button>

    <div class="card">
        <h3>🏆 ARTILHARIA</h3>
        <div id="lista_artilharia"></div>
    </div>

    <div class="card">
        <h3>📋 CONFIRMADOS: <span id="total">0</span></h3>
        <div id="lista"></div>
    </div>

</body>
</html>
