<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beira Rio FC - Oficial</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBDBTZZMnq4xnrhqePqDWxAsg2aJfbFMaE",
          authDomain: "beira-rio-fc-e27b0.firebaseapp.com",
          projectId: "beira-rio-fc-e27b0",
          storageBucket: "beira-rio-fc-e27b0.firebasestorage.app",
          messagingSenderId: "113098706363",
          appId: "1:113098706363:web:5122247d7af8caa52b889e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        const EMAIL_ADMIN = "guisilfreitas19@gmail.com"; 

        window.confirmarPresenca = () => {
            signInWithPopup(auth, provider).then(async (result) => {
                await setDoc(doc(db, "presenca_jogo", result.user.uid), {
                    nome: result.user.displayName,
                    foto: result.user.photoURL
                });
            });
        };

        window.salvarInfo = async () => {
            const data = {
                adversario: document.getElementById('edit_adv').value || "A DEFINIR",
                data: document.getElementById('edit_data').value || "",
                hora: document.getElementById('edit_hora').value || "",
                local: document.getElementById('edit_local').value || "A DEFINIR",
                mural: document.getElementById('edit_aviso').value || "Sem avisos."
            };
            await setDoc(doc(db, "configuracao", "proximo_jogo"), data);
            alert("Jogo Atualizado!");
        };

        window.adicionarGol = async () => {
            const nome = document.getElementById('art_nome').value;
            const gols = parseInt(document.getElementById('art_gols').value);
            if(nome) {
                await setDoc(doc(db, "artilharia", nome), { nome: nome, gols: gols || 0 });
                alert("Gol Salvo!");
            }
        };

        window.zerarTudoParaNovoJogo = async () => {
            if (confirm("Isso vai limpar a lista e resetar o jogo. Confirmar?")) {
                const snap = await getDocs(collection(db, "presenca_jogo"));
                for (const d of snap.docs) { await deleteDoc(doc(db, "presenca_jogo", d.id)); }
                await setDoc(doc(db, "configuracao", "proximo_jogo"), {
                    adversario: "A DEFINIR", data: "", hora: "", local: "A DEFINIR", mural: "Aguardando novo jogo..."
                });
            }
        };

        window.zerarArtilharia = async () => {
            if (confirm("Zerar todos os gols?")) {
                const snap = await getDocs(collection(db, "artilharia"));
                for (const d of snap.docs) { await deleteDoc(doc(db, "artilharia", d.id)); }
            }
        };

        onSnapshot(doc(db, "configuracao", "proximo_jogo"), (doc) => {
            if (doc.exists()) {
                const d = doc.data();
                document.getElementById('display_adv').innerText = d.adversario;
                document.getElementById('display_data_hora').innerText = d.data ? `${d.data.split('-').reverse().join('/')} às ${d.hora}` : "A definir";
                document.getElementById('display_local').innerText = d.local;
                document.getElementById('display_mural').innerText = d.mural;
            }
        });

        onSnapshot(collection(db, "presenca_jogo"), (snapshot) => {
            const lista = document.getElementById('lista');
            lista.innerHTML = "";
            snapshot.forEach((doc) => {
                const j = doc.data();
                lista.innerHTML += `<div class="item-lista"><img src="${j.foto}"><span>${j.nome}</span></div>`;
            });
            document.getElementById('total').innerText = snapshot.size;
        });

        onSnapshot(collection(db, "artilharia"), (snapshot) => {
            const lista = document.getElementById('lista_artilharia');
            lista.innerHTML = "";
            let arts = [];
            snapshot.forEach(d => arts.push(d.data()));
            arts.sort((a, b) => b.gols - a.gols);
            arts.forEach((a, i) => {
                lista.innerHTML += `<div class="item-lista"><b>${i+1}º</b> <span style="flex:1; margin-left:10px;">${a.nome}</span> <b>${a.gols} Gols</b></div>`;
            });
        });

        onAuthStateChanged(auth, (user) => {
            if (user && user.email === EMAIL_ADMIN) document.getElementById('painel_admin').style.display = 'block';
        });
    </script>

    <style>
        body { font-family: sans-serif; background: #0d1117; color: white; padding: 10px; text-align: center; margin: 0; }
        .card { background: #161b22; border-radius: 10px; padding: 12px; border: 1px solid #30363d; margin-bottom: 10px; text-align: left; }
        .btn { background: #238636; color: white; border: none; width: 100%; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; margin-bottom: 5px; }
        .admin-box { background: #1c2128; border: 2px solid #f1e05a; padding: 12px; border-radius: 10px; display: none; margin-bottom: 15px; text-align: left; }
        input { width: 100%; padding: 8px; margin: 4px 0; border-radius: 4px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; font-size: 13px; }
        .escudo { width: 80px; margin-bottom: 5px; }
        .item-lista { padding: 6px; border-bottom: 1px solid #333; display: flex; align-items: center; font-size: 14px; }
        .item-lista img { width: 25px; border-radius: 50%; margin-right: 10px; border: 1px solid #238636; }
        h1 { font-size: 1.4em; margin: 5px 0; }
        label { font-size: 10px; color: #f1e05a; font-weight: bold; text-transform: uppercase; }
        .btn-small { padding: 8px; font-size: 11px; }
    </style>
</head>
<body>

    <img src="escudo.png" class="escudo">
    <h1>BEIRA RIO FC</h1>

    <div id="painel_admin" class="admin-box">
        <label>Configurar Próximo Jogo:</label>
        <input type="text" id="edit_adv" placeholder="Adversário">
        <div style="display:flex; gap:5px;"><input type="date" id="edit_data"><input type="time" id="edit_hora"></div>
        <input type="text" id="edit_local" placeholder="Local">
        <input type="text" id="edit_aviso" placeholder="Mural de Avisos">
        <button class="btn btn-small" style="background:#0077b6;" onclick="salvarInfo()">SALVAR JOGO</button>
        
        <label style="display:block; margin-top:10px;">Artilharia (Nome e Gols):</label>
        <div style="display:flex; gap:5px;"><input type="text" id="art_nome" placeholder="Nome"><input type="number" id="art_gols" placeholder="Gols"></div>
        <button class="btn btn-small" style="background:#8957e5;" onclick="adicionarGol()">ATUALIZAR ARTILHEIRO</button>
        
        <div style="display:flex; gap:5px; margin-top:10px;">
            <button class="btn btn-small" style="background:#da3633; flex:1;" onclick="zerarTudoParaNovoJogo()">LIMPAR JOGO</button>
            <button class="btn btn-small" style
